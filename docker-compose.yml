services:
  bot:
    build: .
    container_name: playerok_bot
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /app/data/store.db
    volumes:
      # База переживает пересборку образа. Без этого — потеря склада.
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
